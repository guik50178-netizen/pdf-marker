<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緑マーカー & 赤シート</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0ec; font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; }

/* ── Toolbar ── */
#toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #ddd;
  padding: 8px 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
#toolbar h1 { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; }

.btn {
  padding: 6px 12px; border: 1px solid #ccc; border-radius: 7px;
  font-size: 12px; font-weight: 500; cursor: pointer; background: #fff;
  color: #333; transition: background .12s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent; user-select: none;
  /* タップしやすい最小高さ */
  min-height: 34px; display: inline-flex; align-items: center; justify-content: center;
}
label.btn { display: inline-flex; }
.btn:hover  { background: #f5f5f5; }
.btn:active { background: #eee; transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* 赤シート */
#toggleBtn.red   { background: #fee; border-color: #f99; color: #c33; }
#toggleBtn.green { background: #efe; border-color: #8c8; color: #363; }

/* マーカーモード — 目立たせる */
#drawModeBtn       { border-color: #aaa; }
#drawModeBtn.on    { background: #fffbe6; border-color: #f0b429; color: #7a5200; font-weight: 600; }

/* 保存先確定後 */
#saveBtn.linked { background: #f0f7f0; border-color: #6a6; color: #363; }

.sep { width: 1px; height: 22px; background: #e0e0e0; flex-shrink: 0; }

#statusTxt   { font-size: 11px; color: #999; margin-left: auto; white-space: nowrap; }
#badge       { font-size: 11px; color: #4a4; display: none; }
#badge.show  { display: inline; }
#savePathTxt { font-size: 11px; color: #888; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Draw mode banner ── */
#drawBanner {
  display: none; position: sticky; top: 56px; z-index: 99;
  background: #fffbe6; border-bottom: 1px solid #f0b429;
  padding: 6px 14px; font-size: 12px; color: #7a5200;
  text-align: center;
}
#drawBanner.show { display: block; }

/* ── PDF area ── */
#pdfContainer {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 12px; gap: 14px;
}
#dropZone {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; height: 60vh;
  color: #bbb; font-size: 14px; text-align: center; padding: 20px;
}

.pgwrap {
  position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  border-radius: 2px;
  display: inline-block;
  /* デフォルト: スクロール・ピンチズーム自由 */
  touch-action: auto;
}
.pgwrap canvas { display: block; border-radius: 2px; }
.hlc { position: absolute; top: 0; left: 0; pointer-events: none; border-radius: 2px; }
.dwc {
  position: absolute; top: 0; left: 0; border-radius: 2px;
  /* デフォルト: タッチはスルー（スクロール等はbrowserに任せる） */
  touch-action: auto;
  cursor: default;
}
/* マーカーモードON時 */
body.draw-mode .pgwrap { cursor: crosshair; }
body.draw-mode .dwc    { touch-action: none; cursor: crosshair; }

/* toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; font-size: 12px; padding: 8px 18px;
  border-radius: 20px; display: none; z-index: 300;
  white-space: nowrap; pointer-events: none;
}
#toast.show { display: block; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>📗 緑マーカー</h1>

  <label class="btn" for="fi">📂 ファイルを開く</label>
  <input type="file" id="fi" accept=".pdf,application/pdf,image/*" multiple style="display:none">

  <div class="sep"></div>

  <!-- マーカーモード（タッチ時の描画/スクロール切り替え） -->
  <button id="drawModeBtn" onclick="toggleDrawMode()">✏️ 描画OFF</button>
  <button id="toggleBtn"   onclick="toggleSheet()">🟥 赤シートOFF</button>
  <button onclick="undoLast()">↩</button>
  <button onclick="clearAll()">🗑</button>

  <div class="sep"></div>

  <button id="saveBtn"       class="btn" onclick="saveAs()">💾 保存先を指定</button>
  <button id="overwriteBtn"  class="btn" onclick="saveOverwrite()" disabled>↺ 上書き</button>
  <label  class="btn" for="si">📂 復元</label>
  <input type="file" id="si" accept=".json,application/json" style="display:none">

  <span id="badge">✓ 保存済</span>
  <span id="savePathTxt"></span>
  <span id="statusTxt">—</span>
</div>

<!-- マーカーモードON時のバナー -->
<div id="drawBanner">
  ✏️ 描画モードON — ドラッグでマーカーを引けます。スクロールするには描画をOFFにしてください。
</div>

<div id="pdfContainer">
  <div id="dropZone">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="12" x2="12" y2="18"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <span>PDFまたは画像を選択してください</span>
    <small style="font-size:11px;color:#ccc">画像は複数選択可 · ブラウザ内のみで処理（外部送信なし）</small>
  </div>
  <div id="pdfPages" style="display:none;flex-direction:column;align-items:center;gap:14px;width:100%"></div>
</div>

<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const FS_API = 'showSaveFilePicker' in window;

let hl = [], redOn = false, drawMode = false;
let fname = null, pdfB64 = null, imagesB64 = [], fileHandle = null;
let pageData = {}, drawing = false, dstart = null, apage = null;
let bTimer = null, toastTimer = null;
let suppressClick = false; // touchend後のclick重複発火を防ぐ

// ── マーカーモード ─────────────────────────────────────────
function toggleDrawMode() {
  drawMode = !drawMode;
  document.body.classList.toggle('draw-mode', drawMode);
  const btn = document.getElementById('drawModeBtn');
  btn.textContent = drawMode ? '✏️ 描画ON' : '✏️ 描画OFF';
  btn.classList.toggle('on', drawMode);
  document.getElementById('drawBanner').classList.toggle('show', drawMode);
}

// ── ファイルを開く（PDF or 画像、複数可）─────────────────────
document.getElementById('fi').addEventListener('change', async e => {
  const files = Array.from(e.target.files); if (!files.length) return;

  // PDFがあればPDFモード、なければ画像モード
  const pdfFile = files.find(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  if (pdfFile) {
    fname = pdfFile.name;
    const reader = new FileReader();
    reader.onload = ev => {
      const bytes = new Uint8Array(ev.target.result);
      pdfB64 = uint8ToB64(bytes);
      loadPDF(bytes);
    };
    reader.readAsArrayBuffer(pdfFile);
  } else {
    // 全て画像として扱う（複数ファイル可）
    const imageFiles = files.filter(f => f.type.startsWith('image/'));
    if (!imageFiles.length) { alert('PDFまたは画像ファイルを選択してください'); return; }
    fname = imageFiles.length === 1 ? imageFiles[0].name : `${imageFiles.length}枚の画像`;
    await loadImages(imageFiles);
  }
  e.target.value = '';
});

// 画像を読み込んで各ページとして表示
async function loadImages(files) {
  setStatus('読み込み中…');
  hl = []; pageData = {};
  const pg = document.getElementById('pdfPages');
  document.getElementById('dropZone').style.display = 'none';
  pg.style.display = 'flex'; pg.innerHTML = '';

  // PDFBase64は無効化（画像モードは別系統で保存）
  pdfB64 = null;
  imagesB64 = [];

  for (let i = 0; i < files.length; i++) {
    const b64 = await fileToB64(files[i]);
    imagesB64.push(b64);
    await renderImagePage(b64, i + 1, pg);
  }

  setStatus(`${files.length}枚 | ${fname}`);
  tryLoadLS(); redrawAll();
}

function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result); // data URL形式
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function renderImagePage(dataUrl, num, container) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const maxW = Math.min(window.innerWidth - 24, 960);
      const scale = maxW / img.width;
      const w = img.width * scale, h = img.height * scale;
      const wrap = document.createElement('div');
      wrap.className = 'pgwrap';
      wrap.style.cssText = `width:${w}px;height:${h}px`;
      const pc = document.createElement('canvas'); pc.width = w; pc.height = h;
      const hc = document.createElement('canvas'); hc.className = 'hlc'; hc.width = w; hc.height = h;
      const dc = document.createElement('canvas'); dc.className = 'dwc'; dc.width = w; dc.height = h;
      wrap.append(pc, hc, dc); container.appendChild(wrap);
      pc.getContext('2d').drawImage(img, 0, 0, w, h);
      pageData[num] = { hc, dc };
      attachEvents(dc, num);
      resolve();
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// ── PDF描画 ────────────────────────────────────────────────
async function loadPDF(bytes) {
  setStatus('読み込み中…');
  hl = []; pageData = {}; imagesB64 = [];
  const pg = document.getElementById('pdfPages');
  document.getElementById('dropZone').style.display = 'none';
  pg.style.display = 'flex'; pg.innerHTML = '';
  const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
  const n = doc.numPages;
  for (let p = 1; p <= n; p++) await renderPage(doc, p, pg);
  setStatus(`${n}ページ | ${fname}`);
  tryLoadLS(); redrawAll();
}

async function renderPage(doc, num, container) {
  const page = await doc.getPage(num);
  const maxW = Math.min(window.innerWidth - 24, 960);
  const vp = page.getViewport({ scale: maxW / page.getViewport({ scale: 1 }).width });
  const wrap = document.createElement('div');
  wrap.className = 'pgwrap';
  wrap.style.cssText = `width:${vp.width}px;height:${vp.height}px`;
  const pc = mkc('', vp), hc = mkc('hlc', vp), dc = mkc('dwc', vp);
  wrap.append(pc, hc, dc); container.appendChild(wrap);
  await page.render({ canvasContext: pc.getContext('2d'), viewport: vp }).promise;
  pageData[num] = { hc, dc };
  attachEvents(dc, num);
}

// イベントハンドラをcanvasに装着（PDF・画像共通）
function attachEvents(dc, num) {
  dc.addEventListener('mousedown', e => sd(ec(e, dc), num));
  dc.addEventListener('mousemove', e => mv(ec(e, dc), num));
  dc.addEventListener('mouseup',   e => eu(ec(e, dc), num));
  dc.addEventListener('mouseleave',e => { if (drawing && apage === num) eu(ec(e, dc), num); });
  dc.addEventListener('click', e => {
    if (suppressClick) { suppressClick = false; return; }
    handleRevealTap(ec(e, dc), num);
  });

  dc.addEventListener('touchstart', e => {
    if (!drawMode || e.touches.length > 1) return;
    e.preventDefault(); sd(ec(e, dc), num);
  }, { passive: false });
  dc.addEventListener('touchmove', e => {
    if (!drawMode || e.touches.length > 1) return;
    e.preventDefault(); mv(ec(e, dc), num);
  }, { passive: false });
  dc.addEventListener('touchend', e => {
    const pos = ec(e, dc);
    suppressClick = true;
    if (drawMode) { e.preventDefault(); eu(pos, num); }
    else { e.preventDefault(); handleRevealTap(pos, num); }
  }, { passive: false });
}

function mkc(cls, vp) { const c = document.createElement('canvas'); if (cls) c.className = cls; c.width = vp.width; c.height = vp.height; return c; }

// 統一座標変換 — マウス・タッチ両対応、CSSズレ補正込み
function ec(e, canvas) {
  const r = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches !== undefined) {
    const t = e.touches[0] || e.changedTouches[0];
    cx = t.clientX; cy = t.clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  return {
    x: (cx - r.left) * (canvas.width  / r.width),
    y: (cy - r.top)  * (canvas.height / r.height)
  };
}
function rc(a, b) { return [Math.min(a.x,b.x), Math.min(a.y,b.y), Math.abs(b.x-a.x), Math.abs(b.y-a.y)]; }

function sd(pos, p) {
  if (!drawMode) return;
  drawing = true; apage = p; dstart = pos;
}
function mv(pos, p) {
  if (!drawing || !drawMode || apage !== p) return;
  const { dc } = pageData[p], ctx = dc.getContext('2d');
  ctx.clearRect(0, 0, dc.width, dc.height);
  const [x,y,w,h] = rc(dstart, pos);
  ctx.fillStyle = 'rgba(60,200,80,.3)'; ctx.fillRect(x, y, w, h);
}
function eu(pos, p) {
  if (!drawing || !drawMode || apage !== p) return; drawing = false;
  const [x,y,w,h] = rc(dstart, pos);
  if (w > 4 && h > 4) { hl.push({ page: p, x, y, w, h, hidden: false }); autoSave(); }
  const { dc } = pageData[p]; dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
  drawPage(p); dstart = null;
}

function drawPage(p) {
  if (!pageData[p]) return;
  const { hc } = pageData[p], ctx = hc.getContext('2d');
  ctx.clearRect(0, 0, hc.width, hc.height);
  hl.filter(h => h.page === p).forEach(h => {
    if (!redOn) {
      // 通常表示: 緑マーカー
      ctx.fillStyle = 'rgba(50,210,70,.38)'; ctx.fillRect(h.x, h.y, h.w, h.h);
      ctx.strokeStyle = 'rgba(30,170,50,.45)'; ctx.lineWidth = 1; ctx.strokeRect(h.x, h.y, h.w, h.h);
    } else if (h.hidden) {
      // 赤シートON + 未タップ: 白で隠す
      ctx.fillStyle = '#f4f4ee'; ctx.fillRect(h.x, h.y, h.w, h.h);
    } else {
      // 赤シートON + タップ済み: 薄緑で答えを見せる
      ctx.fillStyle = 'rgba(50,210,70,.25)'; ctx.fillRect(h.x, h.y, h.w, h.h);
      ctx.strokeStyle = 'rgba(30,170,50,.5)'; ctx.lineWidth = 1.5; ctx.strokeRect(h.x, h.y, h.w, h.h);
    }
  });
}
function redrawAll() { Object.keys(pageData).forEach(p => drawPage(+p)); }

// ── コントロール ───────────────────────────────────────────
function toggleSheet() {
  redOn = !redOn;
  const btn = document.getElementById('toggleBtn');
  btn.textContent = redOn ? '🟩 赤シートON' : '🟥 赤シートOFF';
  btn.className = 'btn ' + (redOn ? 'red' : 'green');
  if (!redOn) {
    // 赤シートOFF時に全マーカーを未タップ状態にリセット
    hl.forEach(h => h.hidden = false);
  } else {
    // 赤シートON時に全マーカーを隠す
    hl.forEach(h => h.hidden = true);
  }
  redrawAll();
}

// 赤シートON中のタップ→個別に答えを表示
function handleRevealTap(pos, p) {
  if (!redOn || drawMode) return;
  const pad = 8; // 指の太さ分の判定拡張
  const hits = hl.filter(h =>
    h.page === p &&
    pos.x >= h.x - pad && pos.x <= h.x + h.w + pad &&
    pos.y >= h.y - pad && pos.y <= h.y + h.h + pad
  );
  if (!hits.length) return;
  const target = hits[hits.length - 1];
  target.hidden = !target.hidden;
  drawPage(p);
}
function undoLast() { if (!hl.length) return; const l = hl.pop(); autoSave(); drawPage(l.page); }
function clearAll() {
  if (!hl.length) return;
  if (!confirm('全マーカーを消去しますか？')) return;
  const ps = [...new Set(hl.map(h => h.page))];
  hl = []; autoSave(); ps.forEach(p => drawPage(p));
}

// ── 保存 ──────────────────────────────────────────────────
function buildPayload() {
  return JSON.stringify({
    version: 2,
    fileName: fname,
    pdfB64,
    imagesB64,  // 画像モード用
    highlights: hl
  }, null, 2);
}
async function autoSave() {
  if (fileHandle) {
    try {
      const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await writeToHandle(fileHandle, buildPayload());
        showBadge('✓ 自動保存');
      } else {
        tryWriteLS();
        showBadge('⚠ 権限切れ — 上書きボタンで再保存を');
      }
    } catch (e) { tryWriteLS(); }
  } else {
    tryWriteLS();
  }
}
async function saveAs() {
  if (!fname) { alert('ファイルが開かれていません。'); return; }
  if (FS_API) {
    try {
      const base = fname.replace(/\.(pdf|png|jpe?g|webp|gif)$/i, '');
      const h = await window.showSaveFilePicker({
        suggestedName: base + '_session.json',
        types: [{ description: 'セッションファイル', accept: { 'application/json': ['.json'] } }]
      });
      await writeToHandle(h, buildPayload());
      fileHandle = h;
      document.getElementById('overwriteBtn').disabled = false;
      document.getElementById('saveBtn').classList.add('linked');
      document.getElementById('savePathTxt').textContent = '📍 ' + h.name;
      showBadge('✓ 保存しました'); toast(`保存: ${h.name}`);
    } catch (e) { if (e.name !== 'AbortError') toast('保存失敗: ' + e.message); }
  } else {
    fallbackDL(); toast('このブラウザは保存先指定未対応です（Chromeを推奨）');
  }
}
async function saveOverwrite() {
  if (!fileHandle) return;
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      const req = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (req !== 'granted') { toast('書き込み権限が拒否されました'); return; }
    }
    await writeToHandle(fileHandle, buildPayload());
    showBadge('✓ 上書き保存'); toast(`上書き保存: ${fileHandle.name}`);
  } catch (e) { toast('失敗: ' + e.message); }
}
async function writeToHandle(h, text) {
  const w = await h.createWritable();
  await w.write(text);
  await w.close();
}
function fallbackDL() {
  const base = (fname || 's').replace(/\.(pdf|png|jpe?g|webp|gif)$/i, '');
  const blob = new Blob([buildPayload()], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: base + '_session.json' });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── 復元 ──────────────────────────────────────────────────
document.getElementById('si').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!Array.isArray(d.highlights)) throw new Error('形式エラー');

      fname = d.fileName || 'restored';
      fileHandle = null;
      document.getElementById('overwriteBtn').disabled = true;
      document.getElementById('saveBtn').classList.remove('linked');
      document.getElementById('savePathTxt').textContent = '';

      if (d.pdfB64) {
        // PDFモード
        pdfB64 = d.pdfB64; imagesB64 = [];
        await restorePDF(b64ToUint8(d.pdfB64), d.highlights);
      } else if (Array.isArray(d.imagesB64) && d.imagesB64.length) {
        // 画像モード
        pdfB64 = null; imagesB64 = d.imagesB64;
        await restoreImages(d.imagesB64, d.highlights);
      } else {
        throw new Error('ファイルデータが見つかりません');
      }
      toast(`復元完了（マーカー ${d.highlights.length}件）`);
    } catch (err) { alert('復元失敗: ' + err.message); }
  };
  r.readAsText(f); e.target.value = '';
});

async function restorePDF(bytes, savedHL) {
  setStatus('復元中…'); pageData = {};
  const pg = document.getElementById('pdfPages');
  document.getElementById('dropZone').style.display = 'none';
  pg.style.display = 'flex'; pg.innerHTML = '';
  const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
  const n = doc.numPages;
  for (let p = 1; p <= n; p++) await renderPage(doc, p, pg);
  hl = savedHL; setStatus(`${n}ページ | ${fname}`); redrawAll();
}

async function restoreImages(images, savedHL) {
  setStatus('復元中…'); pageData = {};
  const pg = document.getElementById('pdfPages');
  document.getElementById('dropZone').style.display = 'none';
  pg.style.display = 'flex'; pg.innerHTML = '';
  for (let i = 0; i < images.length; i++) {
    await renderImagePage(images[i], i + 1, pg);
  }
  hl = savedHL; setStatus(`${images.length}枚 | ${fname}`); redrawAll();
}

// ── LocalStorage フォールバック ───────────────────────────
function tryWriteLS() {
  const k = 'hlm::' + (fname||'__');
  // まずフルで保存試行
  try { localStorage.setItem(k, JSON.stringify({ fileName:fname, pdfB64, imagesB64, highlights:hl })); showBadge('✓ LS保存'); return; } catch {}
  // 容量超過時はメディアを除外
  try { localStorage.setItem(k, JSON.stringify({ fileName:fname, pdfB64:null, imagesB64:[], highlights:hl })); showBadge('✓ HL保存'); return; } catch {}
  toast('LocalStorage容量不足。「保存先を指定」で手動保存してください。');
}
function tryLoadLS() {
  try { const r = localStorage.getItem('hlm::'+fname); if (r) { hl = JSON.parse(r).highlights||[]; showBadge('✓ 自動復元'); } } catch {}
}

// ── Utils ─────────────────────────────────────────────────
function uint8ToB64(bytes) {
  let bin = ''; const c = 8192;
  for (let i = 0; i < bytes.length; i += c) bin += String.fromCharCode(...bytes.subarray(i, i+c));
  return btoa(bin);
}
function b64ToUint8(b64) { const bin = atob(b64), out = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }
function setStatus(t) { document.getElementById('statusTxt').textContent = t; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),3000); }
function showBadge(msg='✓ 保存済') { const b=document.getElementById('badge'); b.textContent=msg; b.classList.add('show'); clearTimeout(bTimer); bTimer=setTimeout(()=>b.classList.remove('show'),2500); }
